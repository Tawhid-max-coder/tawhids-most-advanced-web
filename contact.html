<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0f0f0;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 60px;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    .card h1 {
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #ffffffdd;
      letter-spacing: 1px;
    }

    .info-block {
      margin: 20px 0;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #eeeeee;
    }

    .info-block span.icon {
      font-size: 1.5rem;
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 20px;
      }

      .card h1 {
        font-size: 2rem;
      }

      .info-block {
        font-size: 1rem;
      }

      .info-block span.icon {
        font-size: 1.2rem;
      }
    }

    /* Optional animation */
    .card {
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Get in Touch</h1>

    <div class="info-block">
      <span class="icon">📞</span>
      <span>01911******</span>
    </div>

    <div class="info-block">
      <span class="icon">📧</span>
      <span>tawhidfcdls23@gmail.com</span>
    </div>

    <div class="info-block">
      <span class="icon">💬</span>
      <span>tawhidfcdls23@yahoo.com</span>
    </div>

    <div class="info-block">
      <span class="icon">📍</span>
      <span>Sylhet, Bnagladesh</span>
    </div>
  </div>

</body>
</html>
